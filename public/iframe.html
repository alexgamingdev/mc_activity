<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC Activity - iframe</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0f3460;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 2rem;
      color: #ffffff;
      margin-bottom: 12px;
    }

    p {
      font-size: 1rem;
      color: #a0b4d0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MC Activity</h1>
    <p>The activity is loading...</p>
  </div>
</body>
</html>
